<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>APINEX – AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:#252b32;background:#fafbfd}
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:180px;background:#fff;border-right:1px solid #b8b8b8;flex-shrink:0;overflow-y:auto;padding-top:40px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding-top:40px}
/* GNB */
.gnb{position:fixed;top:0;left:0;right:0;height:40px;z-index:100;background:#efefef;border-bottom:1px solid #b8b8b8;display:flex;align-items:center;padding:0 24px}
.gnb-logo{font-size:15px;font-weight:700}
.gnb-r{margin-left:auto;display:flex;align-items:center;gap:14px}
.gnb-notif{position:relative;cursor:pointer;display:flex;align-items:center}
.gnb-badge{background:#ff3b3b;color:#fff;font-size:10px;font-weight:700;border-radius:100px;padding:1px 5px;position:absolute;top:-6px;right:-8px}
.gnb-user{display:flex;align-items:center;gap:6px;font-size:13px;color:#6b6b6b}
.gnb-av{width:24px;height:24px;border-radius:50%;background:#d4dbe4;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#6b6b6b}
/* Sidebar */
.role-tab{display:flex;margin:12px 9px 10px;border:1px solid #535353}
.role-tab span{flex:1;text-align:center;font-size:13px;padding:5px 0;cursor:pointer;color:#535353}
.role-tab span.on{background:#535353;color:#fff}
.sb1{padding:9px 13px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between;color:#252b32}
.sb1.ai{color:#0d58ee}
.sb1 .arr{font-size:10px;color:#9ca3af;transition:transform .2s}
.sb1.open .arr{transform:rotate(180deg)}
.sb-sub{overflow:hidden;max-height:0;transition:max-height .25s}
.sb-sub.open{max-height:300px}
.sb2{padding:6px 13px 6px 20px;font-size:14px;cursor:pointer;display:block;color:#252b32;text-decoration:none}
.sb2:hover{color:#0d58ee}
.sb2.on{color:#0d58ee;font-weight:700}
.sbdiv{height:1px;background:#d4dbe4;margin:2px 0}
/* Breadcrumb */
.bc{height:50px;border-bottom:1px solid #b8b8b8;display:flex;align-items:center;padding:0 36px;gap:8px;font-size:14px;flex-shrink:0}
.bc a{text-decoration:underline;cursor:pointer;color:#252b32}
.bc a:hover{color:#0d58ee}
.bc-sep{color:#9ca3af}
.bc-cur{font-weight:700}
/* Page */
.pb{flex:1;overflow-y:auto;padding:28px 36px 60px}
.ptitle{font-size:22px;font-weight:700;margin-bottom:4px}
.pdesc{font-size:14px;color:#6b6b6b;line-height:1.6;margin-bottom:20px}
/* Cards */
.card{background:#fff;border:1px solid #d4dbe4;border-radius:10px;padding:22px 26px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0f2f5}
/* Stat grid */
.stat4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-c{background:#fff;border:1px solid #d4dbe4;border-radius:10px;padding:16px 18px}
.stat-c .sl{font-size:12px;color:#9ca3af;margin-bottom:6px}
.stat-c .sv{font-size:24px;font-weight:700}
.stat-c .ss{font-size:12px;margin-top:4px}
/* Table */
.dtbl{width:100%;border-collapse:collapse;background:#fff;border:1px solid #d4dbe4;border-radius:10px;overflow:hidden;font-size:14px}
.dtbl thead th{background:#fafbfd;border-bottom:1px solid #d4dbe4;padding:11px 14px;text-align:left;font-size:13px;color:#6b6b6b;font-weight:500;white-space:nowrap}
.dtbl tbody tr{border-bottom:1px solid #f0f2f5;cursor:pointer;transition:background .1s}
.dtbl tbody tr:hover{background:#f8fbff}
.dtbl tbody tr:last-child{border-bottom:none}
.dtbl tbody td{padding:11px 14px;vertical-align:middle}
.nc{font-weight:700}
.nc small{font-weight:400;color:#9ca3af;font-size:12px;display:block;margin-top:2px}
/* Pills & badges */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:500;white-space:nowrap}
.p-on{background:#e8f8f5;color:#0f6e56}
.p-off{background:#f5f5f5;color:#9ca3af}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.bdg{font-size:11px;font-weight:700;padding:2px 8px;border-radius:100px}
.b-http{background:#f0f4ff;color:#0d58ee}
.b-sse{background:#fafbfd;color:#6b6b6b;border:1px solid #d4dbe4}
.b-on{background:#e8f8f5;color:#0f6e56}
.b-off{background:#f5f5f5;color:#9ca3af}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:4px;padding:8px 18px;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500;border:none}
.btn-p{background:#0d58ee;color:#fff}.btn-p:hover{background:#0947c8}
.btn-s{background:#fff;color:#252b32;border:1px solid #d4dbe4}.btn-s:hover{border-color:#252b32}
.btn-g{background:none;color:#6b6b6b;border:none;font-family:inherit;cursor:pointer;font-size:14px;padding:0}
.btn-sm{padding:4px 11px;font-size:12px;border-radius:4px;cursor:pointer;font-family:inherit;border:1px solid #d4dbe4;background:#fff;color:#252b32}
.btn-sm:hover{border-color:#0d58ee;color:#0d58ee}
.btn-del{border-color:#ffd4d4;color:#ff3b3b}.btn-del:hover{border-color:#ff3b3b}
.btn-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
/* Tab */
.tab-bar{display:flex;border-bottom:1px solid #d4dbe4;margin-bottom:20px}
.tabbtn{padding:9px 18px;font-size:15px;font-family:inherit;cursor:pointer;color:#9ca3af;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px}
.tabbtn.on{color:#0d58ee;font-weight:700;border-bottom-color:#0d58ee}
.tabpanel{display:none}
.tabpanel.on{display:block}
/* Detail tab */
.dtab-bar{display:flex;padding:0 36px;background:#fff;border-bottom:1px solid #d4dbe4}
.dtabbtn{padding:10px 18px;font-size:14px;font-family:inherit;cursor:pointer;color:#9ca3af;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px}
.dtabbtn.on{color:#0d58ee;font-weight:700;border-bottom-color:#0d58ee}
/* Form */
.frow{margin-bottom:18px}
.frow:last-child{margin-bottom:0}
.flbl{font-size:14px;font-weight:500;margin-bottom:7px;display:flex;align-items:center;gap:4px}
.req{color:#ff3b3b;font-size:11px}
.finput,.fsel,.ftxt{width:100%;border:1px solid #d4dbe4;border-radius:6px;padding:9px 14px;font-size:14px;font-family:inherit;color:#252b32;background:#fff;outline:none;transition:border-color .15s}
.finput:focus,.fsel:focus,.ftxt:focus{border-color:#0d58ee;box-shadow:0 0 0 3px rgba(13,88,238,.07)}
.ftxt{min-height:70px;resize:vertical}
.fhint{font-size:12px;color:#9ca3af;margin-top:5px;line-height:1.5}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.toggle{width:36px;height:20px;border-radius:100px;background:#d4dbe4;position:relative;flex-shrink:0;cursor:pointer;transition:background .2s}
.toggle.on{background:#0d58ee}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:18px}
.trow{display:flex;align-items:center;gap:10px}
/* Info boxes */
.ibox{background:#f0f4ff;border:1px solid #b5d4f4;border-radius:6px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:#0947c8;line-height:1.6;display:flex;gap:8px;align-items:flex-start}
.wbox{background:#faeeda;border:1px solid #fac775;border-radius:6px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:#854f0b;line-height:1.6;display:flex;gap:8px;align-items:flex-start}
/* Auth cards */
.auth-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.auth-card{border:1px solid #d4dbe4;border-radius:8px;padding:12px 14px;cursor:pointer;transition:.15s}
.auth-card.sel{border:2px solid #0d58ee;background:#f8fbff}
.auth-card-t{font-size:13px;font-weight:700;margin-bottom:2px}
.auth-card-d{font-size:11px;color:#6b6b6b}
/* Test connection */
.test-row{display:flex;align-items:center;gap:12px}
.btn-test{background:#0d58ee;color:#fff;border:none;border-radius:4px;padding:7px 16px;font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-test:hover{background:#0947c8}
.conn-res{display:none;align-items:center;gap:6px;font-size:13px}
.conn-res.show{display:flex}
.c-ok{color:#27b657;font-weight:500}
.c-fail{color:#cc2e2e;font-weight:500}
/* TOOL list */
.tl{display:flex;flex-direction:column;border:1px solid #d4dbe4;border-radius:10px;overflow:hidden;background:#fff}
.tl-sec{padding:9px 18px 6px;background:#fafbfd;border-bottom:1px solid #f0f2f5;font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.6px}
.tl-row{display:flex;align-items:center;border-bottom:1px solid #f0f2f5;padding:12px 18px;transition:background .1s}
.tl-row:last-child{border-bottom:none}
.tl-row:hover{background:#f8fbff}
.tl-row.dis{opacity:.5}
.tl-ic{width:34px;height:34px;border-radius:8px;background:#e8f8f5;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-right:14px}
.tl-info{flex:1;min-width:0}
.tl-name{font-size:14px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-desc{font-size:12px;color:#6b6b6b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-meta{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:14px}
.tl-rl{font-size:11px;color:#9ca3af;background:#fafbfd;border:1px solid #e0e5eb;border-radius:4px;padding:2px 8px;white-space:nowrap}
/* PII panel */
.pii-panel{display:none;background:#fafbfd;border-top:1px solid #e0e5eb;padding:14px 18px 16px 66px;gap:20px}
.pii-panel.open{display:flex;flex-wrap:wrap}
.pii-section{flex:1;min-width:200px}
.pii-title{font-size:12px;font-weight:700;color:#252b32;margin-bottom:8px}
.pii-chk{display:flex;align-items:center;gap:7px;margin-bottom:7px;cursor:pointer}
.pii-chk input[type=checkbox]{width:16px;height:16px;accent-color:#0d58ee;cursor:pointer;flex-shrink:0}
.pii-chk label{font-size:13px;color:#252b32;cursor:pointer}
.pii-action{display:flex;flex-direction:column;gap:6px}
.pii-radio{display:flex;align-items:center;gap:7px;cursor:pointer}
.pii-radio input[type=radio]{width:16px;height:16px;accent-color:#0d58ee;cursor:pointer;flex-shrink:0}
.pii-radio label{font-size:13px;color:#252b32;cursor:pointer}
/* Page footer */
.pfooter{display:flex;justify-content:flex-end;gap:8px;padding-top:20px;border-top:1px solid #d4dbe4;margin-top:8px}
/* Info table */
.itbl{width:100%;border-collapse:collapse;font-size:14px}
.itbl tr{border-bottom:1px solid #f0f2f5}
.itbl tr:last-child{border-bottom:none}
.itbl td:first-child{padding:12px 0;color:#6b6b6b;width:180px;vertical-align:top;padding-top:14px}
.itbl td:last-child{padding:12px 0}
code{font-family:monospace;font-size:13px;background:#f5f5f5;padding:2px 6px;border-radius:3px}
/* Log */
.ltbl{width:100%;border-collapse:collapse;font-size:13px}
.ltbl thead th{background:#fafbfd;border-bottom:1px solid #d4dbe4;padding:9px 12px;text-align:left;font-size:12px;color:#6b6b6b;font-weight:500;white-space:nowrap}
.ltbl tbody tr{border-bottom:1px solid #f5f5f5}
.ltbl tbody tr:hover{background:#fafbfd}
.ltbl tbody td{padding:9px 12px;vertical-align:middle}
.sev{font-size:11px;font-weight:700;padding:2px 8px;border-radius:3px}
.s-d{background:#f0f0f0;color:#6b6b6b}
.s-i{background:#e5f1ff;color:#0d58ee}
.s-w{background:#faeeda;color:#854f0b}
.s-e{background:#fff0f3;color:#cc2e2e}
.sf-btn{font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;cursor:pointer;font-family:inherit}
/* Dashboard chart */
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#252b32;color:#fff;padding:10px 22px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── TOOL 체크박스 행 ── */
.tool-chk-row{display:flex;align-items:flex-start;gap:12px;padding:12px 18px;border-bottom:1px solid #f0f2f5;cursor:pointer;transition:background .1s}
.tool-chk-row:last-child{border-bottom:none}
.tool-chk-row:hover{background:#f8fbff}
</style>
</head>
<body>

<!-- GNB -->
<div class="gnb">
  <span class="gnb-logo">APINEX</span>
  <div class="gnb-r">
    <div class="gnb-notif">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#252b32" stroke-width="1.6"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="gnb-badge">3</span>
    </div>
    <div class="gnb-user"><div class="gnb-av">개</div><span>개발자</span></div>
  </div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="role-tab"><span>관리자</span><span class="on">개발자</span></div>
    <div class="sb1 open" onclick="toggleSb(this)">API <span class="arr">▲</span></div>
    <div class="sb-sub open">
      <a class="sb2">대시보드</a>
      <a class="sb2">타겟서버 관리</a>
      <a class="sb2">API 관리</a>
    </div>
    <div class="sbdiv"></div>
    <div class="sb1 ai open" onclick="toggleSb(this)">AI <span class="arr">▲</span></div>
    <div class="sb-sub open">
      <a class="sb2" id="sb-dash" onclick="go('dashboard')">대시보드</a>
      <a class="sb2" id="sb-mcp" onclick="go('mcp-list')">MCP 서버 관리</a>
      <a class="sb2" id="sb-aim" onclick="go('ai-manage-list')">AI 관리</a>
    </div>
    <div class="sbdiv"></div>
    <a class="sb2" style="padding-left:13px;font-weight:700;font-size:15px;">API 사용신청관리</a>
    <div class="sbdiv"></div>
    <div class="sb1" onclick="toggleSb(this)">사용자 한도 관리 <span class="arr">▼</span></div>
    <div class="sb-sub"><a class="sb2">사용자 한도 현황</a><a class="sb2">한도 신청 관리</a></div>
    <div class="sbdiv"></div>
    <a class="sb2" style="padding-left:13px;font-weight:700;font-size:15px;">통계</a>
    <div class="sbdiv"></div>
    <div class="sb1" onclick="toggleSb(this)">환경설정 <span class="arr">▼</span></div>
    <div class="sb-sub"><a class="sb2">일반</a><a class="sb2">내 정보</a></div>
    <div class="sbdiv"></div>
    <div class="sb1" onclick="toggleSb(this)">고객지원 <span class="arr">▼</span></div>
    <div class="sb-sub"><a class="sb2">고객문의</a><a class="sb2">API소식</a></div>
  </div>

  <!-- Main -->
  <div class="main" id="main"></div>
</div>
<div class="toast" id="toast-el"></div>

<!-- ======================================================
  TEMPLATES
====================================================== -->

<!-- ① 대시보드 -->
<template id="t-dashboard">
  <div class="bc"><a onclick="go('dashboard')">AI</a><span class="bc-sep">/</span><span class="bc-cur">대시보드</span></div>
  <div class="pb">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;">
      <div><div class="ptitle">AI 대시보드</div><div style="font-size:14px;color:#6b6b6b;">MCP · A2A 운영 현황을 통합 모니터링합니다.</div></div>
      <select class="fsel" style="width:120px;"><option>오늘</option><option>최근 7일</option><option>최근 30일</option></select>
    </div>
    <!-- 요약 카드 -->
    <div class="stat4">
      <div class="stat-c"><div class="sl">MCP 서버</div><div class="sv">3<span style="font-size:13px;font-weight:400;color:#9ca3af;"> 개</span></div><div class="ss" style="color:#0f6e56;">활성 2개</div></div>
      <div class="stat-c"><div class="sl">MCP 오늘 Call 수</div><div class="sv" style="color:#0d58ee;">16,088</div><div class="ss" style="color:#27b657;">▲ 7.1% 어제 대비</div></div>
      <div class="stat-c"><div class="sl">A2A Agent</div><div class="sv">1<span style="font-size:13px;font-weight:400;color:#9ca3af;"> 개</span></div><div class="ss" style="color:#0f6e56;">활성 1개</div></div>
      <div class="stat-c"><div class="sl">A2A 오늘 요청 수</div><div class="sv" style="color:#854f0b;">3,241</div><div class="ss" style="color:#27b657;">▲ 5.2% 어제 대비</div></div>
    </div>
    <!-- 차트 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
      <div class="card" style="margin-bottom:0;">
        <div class="card-title" style="display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;margin-bottom:14px;">
          <span>MCP Call 추이 (7일)</span>
          <div style="display:flex;gap:8px;align-items:center;"><span style="font-size:11px;color:#6b6b6b;display:flex;align-items:center;gap:3px;"><span style="width:10px;height:3px;background:#0d58ee;display:inline-block;border-radius:2px;"></span>MCP</span></div>
        </div>
        <div style="display:flex;align-items:flex-end;gap:6px;height:90px;padding-bottom:8px;border-bottom:1px solid #f0f2f5;">
          <div class="bar-col"><span style="font-size:9px;color:#9ca3af;">9.8K</span><div style="width:100%;background:#b5d4f4;border-radius:3px 3px 0 0;height:56px;"></div><span style="font-size:9px;color:#9ca3af;">03/17</span></div>
          <div class="bar-col"><span style="font-size:9px;color:#9ca3af;">11.2K</span><div style="width:100%;background:#b5d4f4;border-radius:3px 3px 0 0;height:65px;"></div><span style="font-size:9px;color:#9ca3af;">03/18</span></div>
          <div class="bar-col"><span style="font-size:9px;color:#9ca3af;">10.5K</span><div style="width:100%;background:#b5d4f4;border-radius:3px 3px 0 0;height:60px;"></div><span style="font-size:9px;color:#9ca3af;">03/19</span></div>
          <div class="bar-col"><span style="font-size:9px;color:#9ca3af;">13.1K</span><div style="width:100%;background:#b5d4f4;border-radius:3px 3px 0 0;height:75px;"></div><span style="font-size:9px;color:#9ca3af;">03/20</span></div>
          <div class="bar-col"><span style="font-size:9px;color:#9ca3af;">11.8K</span><div style="width:100%;background:#b5d4f4;border-radius:3px 3px 0 0;height:68px;"></div><span style="font-size:9px;color:#9ca3af;">03/21</span></div>
          <div class="bar-col"><span style="font-size:9px;color:#9ca3af;">11.9K</span><div style="width:100%;background:#b5d4f4;border-radius:3px 3px 0 0;height:68px;"></div><span style="font-size:9px;color:#9ca3af;">03/22</span></div>
          <div class="bar-col"><span style="font-size:9px;color:#0d58ee;font-weight:700;">16.1K</span><div style="width:100%;background:#0d58ee;border-radius:3px 3px 0 0;height:90px;"></div><span style="font-size:9px;color:#0d58ee;font-weight:700;">오늘</span></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:0;">

            <span style="font-size:11px;color:#0f6e56;background:#e8f8f5;padding:2px 8px;border-radius:100px;font-weight:500;">이메일 · 마스킹</span>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"><path d="M18 9l-6 6-6-6"/></svg>
        </div>
        <div class="pii-panel" id="tc-pii-fetch">
          <div class="pii-section"><div class="pii-title">PII 비식별화 대상</div><label class="pii-chk"><input type="checkbox" checked><label>이메일 주소</label></label><label class="pii-chk"><input type="checkbox"><label>주민등록번호</label></label><label class="pii-chk"><input type="checkbox"><label>전화번호</label></label><label class="pii-chk"><input type="checkbox"><label>신용카드 번호</label></label></div>
          <div class="pii-section"><div class="pii-title">처리 방식</div><div class="pii-action"><label class="pii-radio"><input type="radio" name="tc-f-act" checked><label>마스킹 처리</label></label><label class="pii-radio"><input type="radio" name="tc-f-act"><label>데이터 삭제</label></label><label class="pii-radio"><input type="radio" name="tc-f-act"><label>요청 거부</label></label></div></div>
        </div>
      </div>

      <div style="border:1px solid #d4dbe4;border-radius:8px;overflow:hidden;margin-bottom:12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:#fafbfd;cursor:pointer;" onclick="togglePii('tc-pii-createpages')">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:14px;font-weight:700;">notion-create-pages</span>
            <span style="font-size:11px;color:#ff3b3b;background:#fff0f3;padding:2px 8px;border-radius:100px;font-weight:500;">이메일, 신용카드 · 요청거부</span>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"><path d="M18 9l-6 6-6-6"/></svg>
        </div>
        <div class="pii-panel" id="tc-pii-createpages">
          <div class="pii-section"><div class="pii-title">PII 비식별화 대상</div><label class="pii-chk"><input type="checkbox" checked><label>이메일 주소</label></label><label class="pii-chk"><input type="checkbox"><label>주민등록번호</label></label><label class="pii-chk"><input type="checkbox"><label>전화번호</label></label><label class="pii-chk"><input type="checkbox" checked><label>신용카드 번호</label></label></div>
          <div class="pii-section"><div class="pii-title">처리 방식</div><div class="pii-action"><label class="pii-radio"><input type="radio" name="tc-cp-act"><label>마스킹 처리</label></label><label class="pii-radio"><input type="radio" name="tc-cp-act"><label>데이터 삭제</label></label><label class="pii-radio"><input type="radio" name="tc-cp-act" checked><label>요청 거부</label></label></div></div>
        </div>
      </div>

      <div style="font-size:13px;color:#9ca3af;text-align:center;padding:8px 0;">나머지 선택된 TOOL (notion-query-data-sources 외 5개)은 PII 미설정 상태입니다. 펼쳐서 설정할 수 있습니다.</div>
    </div>

    <!-- STEP 3: Schema Validation -->
    <div class="card">
      <div class="card-title" style="display:flex;align-items:center;gap:8px;">
        <span style="background:#0d58ee;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">3</span>
        Schema Validation
      </div>
      <div style="font-size:14px;color:#6b6b6b;margin-bottom:16px;">MCP 프로토콜 규격 외 요청/응답을 차단합니다. TOOL별로 개별 설정합니다.</div>
      <table class="dtbl">
        <thead><tr><th>TOOL 이름</th><th style="width:140px;">Schema Validation</th></tr></thead>
        <tbody>
          <tr><td style="font-size:14px;">notion-search</td><td><div class="toggle on" onclick="this.classList.toggle('on')" style="margin:0 auto;"></div></td></tr>
          <tr><td style="font-size:14px;">notion-fetch</td><td><div class="toggle on" onclick="this.classList.toggle('on')" style="margin:0 auto;"></div></td></tr>
          <tr><td style="font-size:14px;">notion-query-data-sources</td><td><div class="toggle on" onclick="this.classList.toggle('on')" style="margin:0 auto;"></div></td></tr>
          <tr><td style="font-size:14px;">notion-get-users</td><td><div class="toggle on" onclick="this.classList.toggle('on')" style="margin:0 auto;"></div></td></tr>
          <tr><td style="font-size:14px;">notion-get-teams</td><td><div class="toggle" onclick="this.classList.toggle('on')" style="margin:0 auto;"></div></td></tr>
          <tr><td style="font-size:14px;">notion-get-comments</td><td><div class="toggle" onclick="this.classList.toggle('on')" style="margin:0 auto;"></div></td></tr>
          <tr><td style="font-size:14px;">notion-create-pages</td><td><div class="toggle on" onclick="this.classList.toggle('on')" style="margin:0 auto;"></div></td></tr>
          <tr><td style="font-size:14px;">notion-update-page</td><td><div class="toggle on" onclick="this.classList.toggle('on')" style="margin:0 auto;"></div></td></tr>
          <tr><td style="font-size:14px;">notion-create-database</td><td><div class="toggle" onclick="this.classList.toggle('on')" style="margin:0 auto;"></div></td></tr>
        </tbody>
      </table>
    </div>

    <div class="pfooter">
      <button class="btn btn-s" onclick="go('ai-manage-detail')">취소</button>
      <button class="btn btn-p" onclick="go('ai-manage-detail');toast('TOOL 설정이 저장되었습니다.')">저장</button>
    </div>
  </div>
</template>
<script>
/* ── 라우팅 맵 ── */
const PAGES = {
  'dashboard'       : { tpl: 't-dashboard',        sb: 'sb-dash' },
  'mcp-list'        : { tpl: 't-mcp-list',          sb: 'sb-mcp' },
  'mcp-create'      : { tpl: 't-mcp-create',        sb: 'sb-mcp' },
  'mcp-edit'        : { tpl: 't-mcp-edit',          sb: 'sb-mcp' },
  'mcp-detail'      : { tpl: 't-mcp-detail',        sb: 'sb-mcp' },
  'ai-manage-list'  : { tpl: 't-ai-manage-list',    sb: 'sb-aim' },
  'ai-manage-create': { tpl: 't-ai-manage-create',  sb: 'sb-aim' },
  'ai-manage-edit'  : { tpl: 't-ai-manage-edit',    sb: 'sb-aim' },
  'ai-tool-create'  : { tpl: 't-ai-tool-create',   sb: 'sb-aim' },
  'ai-manage-detail': { tpl: 't-ai-manage-detail',  sb: 'sb-aim' },
};

function go(page) {
  const cfg = PAGES[page];
  if (!cfg) { toast('준비 중인 페이지입니다.'); return; }

  const tpl = document.getElementById(cfg.tpl);
  if (!tpl) { toast('준비 중인 페이지입니다.'); return; }

  const wrap = document.getElementById('main');
  wrap.innerHTML = '';
  wrap.appendChild(tpl.content.cloneNode(true));
  wrap.scrollTop = 0;

  // sidebar 활성
  ['sb-dash','sb-mcp','sb-aim'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('on');
  });
  const sbEl = document.getElementById(cfg.sb);
  if (sbEl) sbEl.classList.add('on');
}

/* ── Sidebar toggle ── */
function toggleSb(el) {
  el.classList.toggle('open');
  const s = el.nextElementSibling;
  if (s?.classList.contains('sb-sub')) s.classList.toggle('open');
}

/* ── Detail tabs ── */
function switchDt(panelId, btn) {
  btn.parentElement.querySelectorAll('.dtabbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  // 같은 prefix를 가진 패널들 hide/show
  const prefix = panelId.split('-')[0];
  document.querySelectorAll('[id^="' + prefix + '-"]').forEach(p => {
    p.style.display = p.id === panelId ? '' : 'none';
  });
}

/* ── List tabs ── */
function switchTab(panelId, btn) {
  btn.parentElement.querySelectorAll('.tabbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.tabpanel').forEach(p => p.classList.remove('on'));
  const p = document.getElementById(panelId);
  if (p) p.classList.add('on');
}

/* ── Auth selector ── */
function selAuth(card, type) {
  document.querySelectorAll('.auth-card').forEach(c => {
    c.classList.remove('sel');
    c.style.border = '1px solid #d4dbe4';
    c.style.background = '';
    const t = c.querySelector('.auth-card-t');
    if (t) t.style.color = '';
  });
  card.classList.add('sel');
  card.style.border = '2px solid #0d58ee';
  card.style.background = '#f8fbff';
  const t = card.querySelector('.auth-card-t');
  if (t) t.style.color = '#0d58ee';

  ['oauth','bearer','apikey'].forEach(k => {
    const f = document.getElementById('af-' + k);
    if (f) f.style.display = k === type ? '' : 'none';
  });
}

/* ── MCP server select (AI 관리 생성) ── */
const MCP_INFO = {
  notion: { url: 'https://mcp.notion.com/mcp', transport: 'Streamable HTTP', auth: 'OAuth 2.0' },
  slack:  { url: 'https://slack.com/api/mcp/v1', transport: 'Streamable HTTP', auth: 'Bearer Token' },
  dev:    { url: 'https://api.anthropic.com/mcp/v1', transport: 'SSE', auth: 'API Key' },
};
function onMcpSelChange(val) {
  const ta = document.getElementById('test-area');
  if (!ta) return;
  if (!val) { ta.style.display = 'none'; return; }
  const info = MCP_INFO[val];
  if (!info) return;
  document.getElementById('ep-url').textContent = info.url;
  document.getElementById('ep-transport').textContent = info.transport;
  document.getElementById('ep-auth').textContent = info.auth;
  ta.style.display = '';
  // 이전 연결 결과 초기화
  const cr = document.getElementById('cr-load');
  if (cr) cr.classList.remove('show');
  const tca = document.getElementById('tool-config-area');
  if (tca) tca.style.display = 'none';
}

function runTestAndLoad() {
  const cr = document.getElementById('cr-load');
  const tca = document.getElementById('tool-config-area');
  if (cr) cr.classList.remove('show');
  if (tca) tca.style.display = 'none';
  setTimeout(() => {
    if (cr) cr.classList.add('show');
    setTimeout(() => {
      if (tca) tca.style.display = '';
    }, 300);
  }, 1200);
}

/* ── Connection test ── */
function runTest(id) {
  const el = document.getElementById('cr-' + id);
  if (!el) return;
  el.classList.remove('show');
  setTimeout(() => el.classList.add('show'), 1200);
}

/* ── PII panel toggle ── */
function togglePii(piiId) {
  const p = document.getElementById(piiId);
  if (!p) return;
  p.classList.toggle('open');
}

/* ── TOOL row toggle (활성/비활성) ── */
function toggleTool(toggleEl, rowId, piiId) {
  toggleEl.classList.toggle('on');
  const row = document.getElementById(rowId);
  if (row) row.classList.toggle('dis', !toggleEl.classList.contains('on'));
  // badge 업데이트
  const badge = row?.querySelector('.tl-name .bdg');
  if (badge) {
    if (toggleEl.classList.contains('on')) {
      badge.textContent = '활성'; badge.className = 'bdg b-on';
    } else {
      badge.textContent = '비활성'; badge.className = 'bdg b-off';
      const pp = document.getElementById(piiId);
      if (pp) pp.classList.remove('open');
    }
  }
}

/* ── Log severity filter ── */
function filterSev(level, btn) {
  btn.closest('div').querySelectorAll('.sf-btn').forEach(b => {
    b.style.background = '#fff'; b.style.color = '#6b6b6b'; b.style.borderColor = '#d4dbe4';
  });
  const cols = {ALL:'#252b32',DEBUG:'#6b6b6b',INFO:'#0d58ee',WARN:'#854f0b',ERROR:'#cc2e2e'};
  btn.style.background = cols[level]; btn.style.color = '#fff'; btn.style.borderColor = cols[level];
  document.querySelectorAll('[data-sev]').forEach(r => {
    r.style.display = (level === 'ALL' || r.dataset.sev === level) ? '' : 'none';
  });
}

/* ── Delete row ── */
function delRow(btn) {
  if (confirm('정말 삭제하시겠습니까?')) { btn.closest('tr').remove(); toast('삭제되었습니다.'); }
}



/* ── 상세 페이지 메인 탭 전환 (TOOL / 버전) ── */
function switchDetailMainTab(tab) {
  const toolPanel = document.getElementById('detail-tool-panel');
  const verPanel  = document.getElementById('detail-ver-panel');
  const btnTool   = document.getElementById('dtab-tool');
  const btnVer    = document.getElementById('dtab-ver');
  const actionBtn = document.getElementById('detail-action-btn');
  if (!toolPanel || !verPanel) return;
  if (tab === 'tool') {
    toolPanel.style.display = '';
    verPanel.style.display  = 'none';
    btnTool.classList.add('on');
    btnVer.classList.remove('on');
    if (actionBtn) actionBtn.innerHTML = `<button class="btn btn-p" onclick="go('ai-tool-create')" style="font-size:13px;padding:7px 14px;"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M6.5 1v11M1 6.5h11"/></svg> TOOL 생성</button>`;
  } else {
    toolPanel.style.display = 'none';
    verPanel.style.display  = 'flex';
    btnTool.classList.remove('on');
    btnVer.classList.add('on');
    if (actionBtn) actionBtn.innerHTML = `<button class="btn" onclick="toast('버전 생성')" style="background:#fff;border:1px solid #0d58ee;color:#0d58ee;padding:6px 14px;font-size:13px;border-radius:4px;display:flex;align-items:center;gap:5px;"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="#0d58ee" stroke-width="2" stroke-linecap="round"><path d="M6.5 1v11M1 6.5h11"/></svg> 버전 생성</button>`;
  }
}

/* ── TOOL 생성 페이지 체크박스 전체 선택 ── */
function toggleAllToolChk(master) {
  document.querySelectorAll('.tool-chk').forEach(c => c.checked = master.checked);
  updateToolChkState();
}
function updateToolChkState() {
  const all = document.querySelectorAll('.tool-chk');
  const checked = [...all].filter(c => c.checked).length;
  const counter = document.getElementById('tool-chk-count');
  if (counter) counter.textContent = checked;
  const master = document.getElementById('chk-all-tools');
  if (master) { master.checked = checked === all.length; master.indeterminate = checked > 0 && checked < all.length; }
}
/* ── 상세 페이지 버전 SNB ── */
function switchVer(ver) {
  ['v1','v0'].forEach(v => {
    const el = document.getElementById('snb-' + v);
    const arr = document.getElementById('snb-' + v + '-arr');
    if (el) el.style.display = 'none';
    if (arr) arr.style.transform = 'rotate(180deg)';
  });
  const target = document.getElementById('snb-' + ver);
  const tarArr = document.getElementById('snb-' + ver + '-arr');
  if (target) { const isOpen = target.style.display !== 'none'; target.style.display = isOpen ? 'none' : ''; }
  if (tarArr) { tarArr.style.transform = tarArr.style.transform === 'rotate(180deg)' ? 'rotate(0deg)' : 'rotate(180deg)'; }
}
function switchTool(tool) {}

/* ── 케밥 메뉴 ── */
function toggleKebab(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : '';
  if (!isOpen) { setTimeout(() => document.addEventListener('click', function h(e){ if(!el.contains(e.target)){el.style.display='none';document.removeEventListener('click',h);}}, {once:false}), 0); }
}

/* ── Toast ── */
function toast(msg) {
  const t = document.getElementById('toast-el');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── 초기 진입 ── */
go('mcp-list');
</script>
</body>
</html>
